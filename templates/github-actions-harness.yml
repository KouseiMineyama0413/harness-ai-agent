# Copy to .github/workflows/harness.yml in the target repository.
# Runs harness quality gates + agent guardrails on every pull request.
name: harness

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for guard scan-diff --base

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # harness requires >= 22.5 (built-in node:sqlite)
          cache: pnpm

      # Install the target project's own toolchain first (adjust per repo).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install harness
        run: pnpm add -g @peakcode/dev-harness
        # During development, replace with:
        # run: pnpm add -g github:Peakcode-Co-Ltd/dev-harness

      - name: Analyze project
        run: harness analyze

      - name: Diff guardrails (PR only)
        if: github.event_name == 'pull_request'
        run: harness guard scan-diff --base "origin/${{ github.base_ref }}"

      - name: Run quality gates
        run: harness gate run

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-reports
          path: .harness/reports/

      # Surface the latest report on the PR so reviewers see failures inline.
      - name: Comment report on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dir = '.harness/reports';
            if (!fs.existsSync(dir)) return;
            const latest = fs.readdirSync(dir).filter(f => f.endsWith('.md')).sort().pop();
            if (!latest) return;
            const body = fs.readFileSync(`${dir}/${latest}`, 'utf8').slice(0, 60000);
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });
